services:
  app:
    build: .
    ports:
      - "8020:8020"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/ink_timodal.db
      - OLLAMA_BASE=http://ollama:11434
      - TZ=Asia/Tokyo
    depends_on:
      - ollama
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    expose:
      - "11434"
    volumes:
      - ./ollama:/root/.ollama
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    restart: unless-stopped
